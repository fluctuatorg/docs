openapi: 3.0.0
info:
  title: Others
  version: 3.0.0
  description: |
    These APIs provide merchants with customer management, file operations, and bill payment capabilities.
    
    They cover:
    - Customer profile management
    - File upload, retrieval, and management
    - Bill payment services for utility providers and billers in Indonesia
  contact:
    name: Xendit API Support
    email: help@xendit.co
    url: https://www.xendit.co/support
  license:
    name: Proprietary
    url: https://www.xendit.co/terms-and-conditions/
servers:
  - url: 'https://api.xendit.co'
    description: Xendit API
tags:
  - name: Customers
    description: Operations for managing customer profiles and information
  - name: Files
    description: Operations for file upload, retrieval, and management
  - name: Bill Payments
    description: Bill payment services for utility providers and billers in Indonesia
paths:
  # Customers by List
  /customers:
    get:
      operationId: GetCustomers
      summary: Get customers list
      security:
        - BasicAuth: []
      tags:
        - Customers
      description: |
        Retrieves an array with a customer object that matches the provided reference_id - the identifier provided by you

        The Customer Object is a standard data structure to hold information relating to one of your customers. It has the following major components:
        - A Type of customer (Individual or Business)
        - Basic descriptive details of that customer
        - Addresses of the customer
        - Identity accounts and KYC documents to prove the legitimacy of the customer
        - Other metadata
      parameters:
        - $ref: '#/components/parameters/CustAPIVersionHeader'
        - $ref: '#/components/parameters/ForUserIdHeader'
        - $ref: '#/components/parameters/ReferenceIdQueryParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCustomerObject'
              examples:
                getCustomerByReferenceId:
                  value:
                    data:
                      - id: cust-239c16f4-866d-43e8-9341-7badafbc019f
                        reference_id: demo_1475801962607
                        type: INDIVIDUAL
                        individual_detail:
                          given_names: John
                          surname: Doe
                          nationality: null
                          place_of_birth: null
                          date_of_birth: null
                          gender: MALE
                          employment: null
                        email: customer@website.com
                        mobile_number: null
                        phone_number: null
                        hashed_phone_number: null
                        addresses: []
                        identity_accounts: []
                        kyc_documents: []
                        description: null
                        metadata: {}
                        created: '2020-03-30T06:12:47.212Z'
                        updated: '2020-03-30T06:12:47.212Z'
                    has_more: false
        '404':
          $ref: '#/components/responses/ErrorStatusCode404Response'
    post:
      security:
        - BasicAuth: []
      operationId: CreateCustomer
      summary: Create customer request
      description: |
        Make a POST request to this endpoint to create a customer for later use with a payments endpoint.

        The Customer Object is a standard data structure to hold information relating to one of your customers. It has the following major components:
        - A Type of customer (Individual or Business)
        - Basic descriptive details of that customer
        - Addresses of the customer
        - Identity accounts and KYC documents to prove the legitimacy of the customer
        - Other metadata
      tags:
        - Customers
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/CustAPIVersionHeader'
        - $ref: '#/components/parameters/ForUserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCustomerObject'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerObject'
              examples:
                getIndividualCustomer:
                  value:
                    id: cust-239c16f4-866d-43e8-9341-7badafbc019f
                    reference_id: demo_1475801962607
                    type: INDIVIDUAL
                    individual_detail:
                      given_names: John
                      surname: Doe
                      nationality: ID
                      place_of_birth: Jakarta
                      date_of_birth: '1980-01-01'
                      gender: MALE
                      employment:
                        employer_name: Xendit
                        nature_of_business: Payment Gateway
                        role_description: Test dummy
                    email: customer@website.com
                    mobile_number: '+62812123456'
                    phone_number: '+62812123456'
                    hashed_phone_number: +628#######56
                    addresses:
                      - street_line1: Panglima Polim IV
                        street_line2: 'Ruko Grand Panglima Polim, Blok E'
                        city: Jakarta Selatan
                        province_state: DKI Jakarta
                        postal_code: '993448'
