      x-stoplight:
        id: 3ztxa7i2zueqo

  # Download Files by File Id
  '/files/{file_id}/download':
    get:
      operationId: DownloadFileById
      summary: Download file by ID
      security:
        - BasicAuth: []
      tags:
        - Files
      description: Retrieves file details
      parameters:
        - $ref: '#/components/parameters/FileIdPathParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/octet-string:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/ErrorStatusCode404Response'

  # Upload File
  '/files':
    post:
      security:
        - BasicAuth: []
      operationId: UploadFile
      summary: Upload file
      description: |
        Make a POST request to this endpoint to upload a file. We currently support uploading PNG, JPG/JPEG, PDF files of less than 10 MB.
      tags:
        - Files
      parameters:
        - $ref: '#/components/parameters/PurposeHeader'
        - $ref: '#/components/parameters/FileHeader'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileObject'
              examples:
                postFileUpload:
                  value:
                    id: file-ec700c1c-db17-4496-b1fb-04ebe551b412
                    business_id: ec700c1c-db17-4496-b1fb-04ebe551b412
                    purpose: CHARGEBACK_EVIDENCE
                    created: '2020-10-08T06:38:33.479Z'
                    updated: '2020-10-08T06:38:33.479Z'
                    type: image/png
                    size: 10000
