  # Files
  '/files/{file_id}':
    get:
      operationId: GetFileById
      security:
        - BasicAuth: []
      tags:
        - Files
      summary: Get file by ID
      description: Make a GET request to this endpoint to get file details
      parameters:
        - $ref: '#/components/parameters/FileIdPathParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileObject'
              examples:
                getFile:
                  value:
                    id: file-ec700c1c-db17-4496-b1fb-04ebe551b412
                    business_id: ec700c1c-db17-4496-b1fb-04ebe551b412
                    purpose: CHARGEBACK_EVIDENCE
                    created: '2020-10-08T06:38:33.479Z'
                    updated: '2020-10-08T06:38:33.479Z'
                    type: image/png
                    size: 10000
                    url: 'https://files.xendit.co/file-ec700c1c-db17-4496-b1fb-04ebe551b412'
        '404':
          $ref: '#/components/responses/ErrorStatusCode404Response'
      x-stoplight:
        id: g5kcrysiv9d6w
    delete:
      operationId: DeleteFileById
      summary: Delete file by ID
      security:
        - BasicAuth: []
      tags:
        - Files
      description: Make a Delete request to this endpoint to delete the file
      parameters:
        - $ref: '#/components/parameters/FileIdPathParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteFileObject'
              examples:
                deleteFile:
                  value:
                    is_deleted: true
                    id: file-ec700c1c-db17-4496-b1fb-04ebe551b412
                    business_id: b647524d-9c5d-414c-843a-3c819853d6b0
        '404':
