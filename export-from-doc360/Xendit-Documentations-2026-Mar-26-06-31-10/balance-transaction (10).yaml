                    settlement_status: SETTLED
                    estimated_settlement_time: "2025-07-07T05:12:03.000Z"
                    business_id: 67bd3c2936e9d7ed9e91728b
                    created: "2025-07-07T05:12:04.315Z"
                    updated: "2025-07-07T05:12:04.806Z"
                    fee:
                      xendit_fee: 0
                      value_added_tax: 0
                      xendit_withholding_tax: 0
