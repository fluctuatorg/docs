            $ref: '#/components/schemas/ReportUpdated'
    ReportObjectWebhook:
      type: object
      properties:
        id:
            $ref: '#/components/schemas/ReportId'
        url:
            $ref: '#/components/schemas/ReportURL'
        type:
            $ref: '#/components/schemas/ReportType'
        filter:
            $ref: '#/components/schemas/ReportFilter' 
