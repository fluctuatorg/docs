    FeeObject:
      type: object
      required:
        - xendit_fee
        - value_added_tax
        - xendit_withholding_tax
        - third_party_withholding_tax
        - status
      properties:
        xendit_fee:
            $ref: '#/components/schemas/XenditFee'
        value_added_tax:
            $ref: '#/components/schemas/ValueAddedTax' 
        xendit_withholding_tax:
            $ref: '#/components/schemas/XenditWithholdingTax'
        third_party_withholding_tax:
            $ref: '#/components/schemas/ThirdPartyWithholdingTax'
        status:
            $ref: '#/components/schemas/FeeStatus' 
    ProductData:
      type: object
      description: |
        Additional metadata for payment V3 transactions. This object contains product-specific identifiers and is only included when at least one field has a value. All fields are nullable and conditionally populated based on the transaction type and payment flow.
      nullable: true
      properties:
        capture_id:
          type: string
          description: The capture ID for payment V3 transactions. Present for captured payments.
          nullable: true
          example: cptr-123e4567-e89b-12d3-a456-426614174000
        payment_request_id:
          type: string
          description: The payment request ID for payment V3 transactions. Present for payments created via payment V3 payment requests.
          nullable: true
          example: pr-123e4567-e89b-12d3-a456-426614174001
        reusable_payment_link_id:
          type: string
          description: The reusable payment link ID. Present for payments made through reusable payment links.
          nullable: true
          example: rpl-123e4567-e89b-12d3-a456-426614174002
        payment_link_id:
          type: string
          description: The invoice/payment link ID. Present for payments associated with payment links.
          nullable: true
          example: inv-123e4567-e89b-12d3-a456-426614174003
    TransactionObject:
      type: object
      properties:
        id:
            $ref: '#/components/schemas/Id'
        product_id:
            $ref: '#/components/schemas/ProductId'
        type:
            $ref: '#/components/schemas/TransactionType'
        channel_code:
            $ref: '#/components/schemas/ChannelCode'
        reference_id:
            $ref: '#/components/schemas/ReferenceId'
        account_identifier:
            $ref: '#/components/schemas/AccountIdentifier'
        currency:
            $ref: '#/components/schemas/ReportCurrency'
        amount:
            $ref: '#/components/schemas/TransactionAmount'
        net_amount:
            $ref: '#/components/schemas/NetAmount'
        net_amount_currency:
            $ref: '#/components/schemas/NetAmountCurrency'
        cashflow:
            $ref: '#/components/schemas/Cashflow'
        status:
            $ref: '#/components/schemas/TransactionStatus'
        channel_category:
            $ref: '#/components/schemas/ChannelCategory'
        business_id:
            $ref: '#/components/schemas/BusinessId'
        created:
            $ref: '#/components/schemas/TransactionCreated'
        updated:
            $ref: '#/components/schemas/TransactionUpdated'
        fee:
            $ref: '#/components/schemas/FeeObject'
        settlement_status:
            $ref: '#/components/schemas/SettlementStatus'
        estimated_settlement_time:
            $ref: '#/components/schemas/EstimatedSettlementTime'
        product_data:
            $ref: '#/components/schemas/ProductData'
    ReferenceId:
      type: string
      minLength: 1
      maxLength: 255
      description: 'A Reference ID from merchants to identify their request.'
    Id:
      type: string
      description: 'Unique ID generated by Xendit for the particular file'
    BusinessId:
      type: string
      description: 'Unique ID generated by Xendit for the particular file'
    ReportURL:
      type: string
      description: |
        URL to download after report is completed.
        The file to download will only be accessible for 24 hours. When the url is expired, you will need to send a new request to generate the report.
    ReportType:
      type: string
      description: The type of report that will be generated
      enum:
        - BALANCE_HISTORY
        - TRANSACTIONS
        - UPCOMING_TRANSACTIONS
        - DETAILED_TRANSACTIONS
    ReportFilter:
      type: object
      required:
        - from
        - to
      description: |
        Filtering that are applied to report

        The combination of `from` and `to` must be less than 92 days.
      properties:
        from:
          type: string
          format: date-time
          description: The start time of the transaction to be filtered (ISO 8601)
          example: "2025-07-01T00:00:00.000Z"
        to:
          type: string
          format: date-time
          description: The end time of the transaction to be filtered (ISO 8601)
          example: "2025-07-31T23:59:59.000Z"
    ReportCreated:
      type: string
      description: 'The time when the report request is created at UTC+0.'
    ReportUpdated:
      type: string
      description: 'The time when the report is updated at UTC+0.'
    ReportFormat:
      type: string
      description: The format of the report. Available format is `CSV`.
      default: CSV
      enum:
        - CSV
    ReportCurrency:
      type: string
      description: The currency to filter.
      default: IDR
      enum:
        - IDR
        - PHP
        - USD
        - VND
        - THB
        - MYR
        - SGD
        - EUR
        - GBP
        - HKD
        - AUD
    ReportVersion:
      type: string
      description: |  
        Report version indicates which version of report you need. This parameter is only applicable to Transaction Report and is request-only (not returned in response).
        
        Version value <> changelog:
        VERSION_0: Original version
        VERSION_1: Includes Settlement Status, Actual Settlement Time, and Estimated Settlement Time
        VERSION_2: Includes Early Settlement Fee Columns, swapped Payment ID with Product ID
      default: 'VERSION_0'
      enum:
        - VERSION_0
        - VERSION_1
        - VERSION_2
    ReportId:
      type: string
      description: 'Report ID'
    TransactionUpdated:
      type: string
      description: 'Transaction updated timestamp on UTC+0'
    TransactionId:
      type: string
      description: The unique id of transaction. It will have `txn_` as prefix   
    ProductId:
      type: string
      description: The product_id of transaction. Product id will have different prefix for each different product. You can use this id to match the transaction from this API to each product API.
    TransactionType:
      type: string
      description: |
        The type of the transactions. Here are the descriptions:
        - `ADJUSTMENT_ADD`: An adjustment transaction that adds to the balance.
        - `ADJUSTMENT_DEDUCT`: An adjustment transaction that deducts from the balance.
        - `BNPL_PARTNER_SETTLEMENT_CREDIT`: Buy Now Pay Later partner settlement credit transaction.
        - `BNPL_PARTNER_SETTLEMENT_DEBIT`: Buy Now Pay Later partner settlement debit transaction.
        - `CASHBACK_FEE`: Cashback fee transaction.
        - `CASHBACK_VAT`: Cashback VAT transaction.
        - `CHARGEBACK`: A chargeback transaction for disputed charges.
        - `CONVERSION`: Balance conversion transactions between different currencies.
        - `DISBURSEMENT`: The disbursement of money-out transaction.
        - `FOREX_DEDUCTION`: Foreign exchange deduction transaction.
        - `FOREX_DEPOSIT`: Foreign exchange deposit transaction.
        - `IN_PERSON_PAYMENT`: In-person payment transaction.
        - `LOAN_REPAYMENT`: Loan repayment transaction.
        - `OTHER`: Other transaction types not covered by specific categories.
        - `PAYMENT`: The payment that includes all variation of money-in transaction.
        - `REFUND`: A refund transaction created to refund amount from money-in transaction.
        - `REMITTANCE`: A remittance transaction.
        - `REMITTANCE_COLLECTION_PAYMENT`: Remittance collection payment transaction.
        - `REMITTANCE_PAYOUT`: The remittance pay-out transaction.
        - `RESERVES_HOLD`: Transaction for holding reserves.
        - `RESERVES_RELEASE`: Transaction for releasing held reserves.
        - `TOPUP`: A top-up transaction for adding money to account balance.
        - `TRANSFER_IN`: Transfer into the account from another Xendit account.
        - `TRANSFER_OUT`: Transfer out of the account to another Xendit account.
        - `WITHDRAWAL`: A withdrawal transaction for money-out operations.
      enum:
        - ADJUSTMENT_ADD
        - ADJUSTMENT_DEDUCT
        - BNPL_PARTNER_SETTLEMENT_CREDIT
        - BNPL_PARTNER_SETTLEMENT_DEBIT
        - CASHBACK_FEE
        - CASHBACK_VAT
        - CHARGEBACK
        - CONVERSION
        - DISBURSEMENT
        - FOREX_DEDUCTION
        - FOREX_DEPOSIT
        - IN_PERSON_PAYMENT
        - LOAN_REPAYMENT
        - OTHER
        - PAYMENT
        - REFUND
        - REMITTANCE
        - REMITTANCE_COLLECTION_PAYMENT
        - REMITTANCE_PAYOUT
        - RESERVES_HOLD
        - RESERVES_RELEASE
        - TOPUP
        - TRANSFER_IN
        - TRANSFER_OUT
        - WITHDRAWAL

    ChannelCode:
      type: string
      description: The channel of the transaction that is used. See [channel codes](https://xendit-docs.document360.io/docs/available-payment-channels) for the list of available per channel categories.
    AccountIdentifier:
      type: string
      nullable: true
      description: Account identifier of transaction. The format will be different from each channel. For example, on `BANK` channel it will be account number and on `CARD` it will be masked card number.
    TransactionAmount:
      type: number
      description: The amount of transaction. The number of decimal place will be different for each currency according to ISO 4217.
      example: 9989
    NetAmount:
      type: number
      description: The net amount of transaction after it deducted with fee/vat.
      example: 9989
    NetAmountCurrency:
      type: string
      description: The currency of the net amount after fees and taxes are applied.
      enum:
        - IDR
        - PHP
        - USD
        - VND
        - THB
        - MYR
        - SGD
        - EUR
        - GBP
        - HKD
        - AUD
    TransactionCreated:
      type: string
      description: 'Transaction created timestamp on UTC+0'
    Cashflow:
      type: string
      description: |
        Representing whether the transaction is money in or money out For transfer, the transfer out side it will shows up as money out and on transfer in side in will shows up as money-in.
      
        Available values are `MONEY_IN` for money in and `MONEY_OUT` for money out.
    TransactionStatus:
      type: string
      description: |
        The status of the transaction. Here's the description:
        - `PENDING`: The transaction is still pending to be processed. This refers to money out-transaction when the amount is still on hold.
        - `SUCCESS`: The transaction is successfully sent for money-out or already arrives on money-in.
        - `FAILED`: The transaction failed to send/receive.
        - `VOIDED`: The money-in transaction is voided by customer.
        - `REVERSED`:The transaction is reversed by Xendit.
      enum:
        - PENDING
        - SUCCESS
        - FAILED
        - VOIDED
        - REVERSED
    ChannelCategory:
      type: string
      description: |
        The channel category of the transaction to identify the source of the transaction. Here's the description:
        - `DISBURSEMENT` and `REMITTANCE_PAYOUT`:  `BANK` and `CASH`
        - `PAYMENT`: `CARDS`, `CARDLESS_CREDIT`, `DIRECT_DEBIT`, `EWALLET`, `PAYLATER`, `QR_CODE`, `RETAIL_OUTLET`, `VIRTUAL_ACCOUNT`
        - `TRANSFER`: `XENPLATFORM`
        - `CONVERSION`: `OTHER`
      enum:
        - BANK
        - CARDS
        - CARDLESS_CREDIT
        - CASH
        - DIRECT_DEBIT
        - EWALLET
        - PAYLATER
        - QR_CODE
        - RETAIL_OUTLET
        - VIRTUAL_ACCOUNT
        - XENPLATFORM
        - OTHER

    XenditFee:
      type: number
      description: Amount of the Xendit fee for this transaction.
    ValueAddedTax:
      type: number
      description: Amount of the VAT for this transaction.
    XenditWithholdingTax:
      type: number
      description: Amount of the Xendit Withholding Tax for this transaction if applicable. See Tax Documentation for more information.
    ThirdPartyWithholdingTax:
      type: number
      description: Amount of the 3rd Party Withholding Tax for this transaction if applicable.
    FeeStatus:
      type: string
      description: Status of the fee processing. NOT_APPLICABLE means no fees are applicable for this transaction.
      enum:
        - PENDING
        - COMPLETED
        - CANCELED
        - REVERSED
        - NOT_APPLICABLE
    EstimatedSettlementTime:
      type: string
      description: |
          Estimated settlement time will only apply to money-in transactions.
          For money-out transaction, value will be `NULL`
          Estimated settlement time in which transaction amount will be settled to merchant's balance.
    SettlementStatus:
      type: string
      enum:
        - PENDING
        - EARLY_SETTLED
        - SETTLED
      nullable: true
      description: |
        Status of the settlement.
        - `null`: Settlement status is not applicable or not yet determined
        - `PENDING`: Transaction amount has not been settled to merchant's balance
        - `EARLY_SETTLED`: Transaction has been settled early to merchant's balance
        - `SETTLED`: Transaction has been settled to merchant's balance
    TransactionCreatedGte:
      type: string
      description: Start time of transaction by created date. If not specified will list all dates.
    TransactionCreatedLte:
      type: string
      description: End time of transaction by created date. If not specified will list all dates.
    TransactionUpdatedGte:
      type: string
      description: End time of transaction by updated date. If not specified will list all dates.
    TransactionUpdatedLte:
      type: string
      description: Start time of transaction by updated date. If not specified will list all dates.
    TransactionLimit:
      type: number
      default: 10
      description: |
        A limit on the number of transactions to be returned for each request. 
        Limit can range between 1 and 50.
    TransactionAfterId:
      type: string
      description: Id of the immediately previous item. Use this with `links` on the response for pagination.
    TransactionBeforeId:
      type: string
      description: Id of the immediately following item.

    #API Response Schema
    Error400Schema:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
          enum:
            - API_VALIDATION_ERROR
            - FEATURE_NOT_AVAILABLE
        message: 
          type: string
        errors:
            $ref: '#/components/schemas/XenditArrayOfErrors'
    Error403Schema:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
          enum:
            - RATE_LIMIT_EXCEEDED
        message: 
          type: string
        errors:
            $ref: '#/components/schemas/XenditArrayOfErrors'
    Error409Schema:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
          enum:
            - DUPLICATE_ERROR
            - IDEMPOTENCY_ERROR
        message: 
          type: string
        errors:
            $ref: '#/components/schemas/XenditArrayOfErrors'
    XenditArrayOfErrors:
      nullable: true
      type: array
      items:
        oneOf:
          - type: string
          - type: object 