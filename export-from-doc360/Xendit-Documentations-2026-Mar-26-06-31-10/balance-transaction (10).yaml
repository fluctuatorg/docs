openapi: 3.0.0
info:
  title: Balance & Transactions
  version: 3.0.0
  description: |
    Balance & Transactions API provides merchants with information about their account balance, transaction history, and reporting capabilities.
    
    This API covers:
    - Account balance retrieval
    - Transaction history and details
    - Report generation and retrieval
  contact:
    name: Xendit API Support
    email: help@xendit.co
    url: https://www.xendit.co/support
  license:
    name: Proprietary
    url: https://www.xendit.co/terms-and-conditions/
servers:
  - url: 'https://api.xendit.co'
    description: Xendit API
tags:
  - name: Balance
    description: Operations for retrieving account balance information
  - name: Reports
    description: Operations for generating and retrieving account reports
  - name: Transaction
    description: Operations for retrieving transaction history and details
paths:
  # Balance
  /balance:
    get:
      operationId: GetBalance
      security:
        - BasicAuth: []
      tags:
        - Balance
      summary: Get balance
      description: |
        Balance is like your wallet since it will tell you how much money is available to you on Xendit. You can retrieve it to see the current balance on your Xendit cash account. Your balance is debited on any money out transaction, e.g. when performing disbursements or Xendit fees are charged. Your balance is credited when money comes into your account.
      parameters:
        - $ref: '#/components/parameters/AccountTypeQueryParam'
        - $ref: '#/components/parameters/AtTimestampQueryParam'
        - $ref: '#/components/parameters/ForUserIdHeader'
        - $ref: '#/components/parameters/BalanceCurrencyParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                required:
                  - balance
                type: object
                properties:
                  balance:
                    type: integer
                    format: float
                    example: 1241231
        '400':
          $ref: '#/components/responses/ErrorStatusCode400Response'

  # Reports
  '/reports':
    post:
      operationId: GenerateReport
      security:
        - BasicAuth: []
      tags:
        - Reports
      summary: Generate Report
      description: |
        Request this endpoint to generate the report. You can specify the type and filter the content of the report. The flow of this endpoint is asynchronous. Xendit will send callbacks to you after the report is done.

        **Currency parameter usage:**
        - If `type` is `BALANCE_HISTORY`, the `currency` field in the request body must be one of: IDR, PHP, USD, VND, THB, MYR, SGD, EUR, GBP, HKD, AUD.
        - For all other report types, the `currency` field in the request body may be any applicable ISO 4217 currency code (e.g., IDR, PHP, USD, EUR, etc.).

        Once the report is generated, you can use the get report endpoint to download the report file.
      parameters:
        - $ref: '#/components/parameters/ForUserIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportObject'
              examples:
                Basic Transaction Report:
                  value:
                    type: TRANSACTIONS
                    filter:
                      from: '2025-07-01T00:00:00.000Z'
                      to: '2025-07-31T23:59:59.000Z'
                Complete Request:
                  value:
                    type: DETAILED_TRANSACTIONS
                    filter:
                      from: '2025-07-01T00:00:00.000Z'
                      to: '2025-07-15T23:59:59.000Z'
                    format: CSV
                    currency: USD
                    report_version: VERSION_2
        '404':
          $ref: '#/components/responses/ErrorStatusCode404Response'

  # Get Reports by Report ID
  '/reports/{report_id}':
    get:
      operationId: GetReportById
      security:
        - BasicAuth: []
      tags:
        - Reports
      summary: Get Report by ID
      description: Request this endpoint to get single specific report details by report id. You can use this endpoint as alternative compared to using the report callback.
      parameters:
        - $ref: '#/components/parameters/ReportIdPathParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportObjectWithURL'
              examples:
                getReport:
                  value:
                    id: report_5c1b34a2-6ceb-4c24-aba9-c836bac82b28
                    type: BALANCE_HISTORY
                    filter:
                      from: '2021-06-23T04:01:55.574Z'
                      to: '2021-06-24T04:01:55.574Z'
                    format: CSV
                    url: https://transaction-report-files.s3-us-west-2.amazonaws.com/{report_name}
                    currency: IDR
                    business_id: 5f34f60535ba7c1c0eed846a
                    created: '2021-06-24T04:01:55.570Z'
                    updated: '2021-06-24T04:01:55.570Z'
        '400':
          $ref: '#/components/responses/ErrorStatusCode400Response'
        '404':
          $ref: '#/components/responses/ErrorStatusCode404Response'

  # Transaction by Transaction ID
  '/transactions/{transaction_id}':
    get:
      operationId: GetTransactionById
      security:
        - BasicAuth: []
      tags:
        - Transaction
      summary: Get Transaction by ID
      description: Request this endpoint to get single specific transaction details by transaction id. If you need to search by other parameters or to get multiple results, see list transactions.
      parameters:
        - $ref: '#/components/parameters/TransactionIdPathParam'
        - $ref: '#/components/parameters/ForUserIdHeader'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionObject'
              examples:
                # Example for a PAYMENT transaction (main use case)
                getTransaction:
                  value:
                    id: txn_pay_1234567890abcdef
                    product_id: py-123e4567-e89b-12d3-a456-426614174000
                    type: PAYMENT
                    status: SUCCESS
                    channel_category: EWALLET
                    channel_code: ID_SHOPEEPAY
                    reference_id: payref-123456
                    account_identifier: null
                    currency: IDR
                    amount: 100000
                    net_amount: 99000
                    net_amount_currency: IDR
                    cashflow: MONEY_IN
                    settlement_status: SETTLED
                    estimated_settlement_time: "2025-06-01T10:00:00.000Z"
                    business_id: 1234567890abcdef
                    created: "2025-06-01T09:59:00.000Z"
                    updated: "2025-06-01T10:01:00.000Z"
                    fee:
                      xendit_fee: 1000
                      value_added_tax: 0
                      xendit_withholding_tax: 0
                      third_party_withholding_tax: 0
                      status: COMPLETED
                    product_data:
                      capture_id: cap-e1a8b3e8-5b4a-4b1a-8b0e-4e8b1a8b0e4e
                      payment_request_id: pr-e1a8b3e8-5b4a-4b1a-8b0e-4e8b1a8b0e4f
                # Example for a CONVERSION transaction (secondary use case)
                getConversionTransaction:
                  value:
                    id: txn_3365895e-3cc1-490a-b48c-2757ce8ab0e5
                    product_id: cmanl0vtp000101u9lqbvn7im
                    type: CONVERSION
                    status: SUCCESS
                    channel_category: OTHER
                    channel_code: DEFAULT
                    reference_id: cmanl0vtp000101u9lqbvn7im
                    account_identifier: null
                    currency: SGD
                    amount: 6.55
                    net_amount: 5.2
                    net_amount_currency: USD
                    cashflow: MONEY_IN
                    settlement_status: SETTLED
                    estimated_settlement_time: "2025-05-14T06:51:08.999Z"
                    business_id: 675bdaf542c2f448122e71d5
                    created: "2025-05-14T06:51:08.998Z"
                    updated: "2025-05-14T06:52:34.196Z"
                    fee:
                      xendit_fee: 0
                      value_added_tax: 0
                      xendit_withholding_tax: 0
                      third_party_withholding_tax: 0
                      status: NOT_APPLICABLE
                # Example for a Virtual Account payment transaction
                getVirtualAccountTransaction:
                  value:
                    id: txn_79cb0a16-3753-404e-a959-421a0cd02a9a
