                  - id: txn_8c36b107-a52e-478a-8dde-59bfa7212bc6
                    product_id: d2845324-50d1-41bc-8583-0b888456ebfe
                    type: PAYMENT
                    status: SUCCESS
                    channel_category: EWALLET
