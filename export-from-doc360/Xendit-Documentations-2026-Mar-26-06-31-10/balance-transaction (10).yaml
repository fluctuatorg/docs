                    product_data:
                      capture_id: cap-123e4567-e89b-12d3-a456-426614174000
                      payment_request_id: pr-123e4567-e89b-12d3-a456-426614174001
        '400':
          $ref: '#/components/responses/ErrorStatusCode400Response'
        '404':
          $ref: '#/components/responses/ErrorStatusCode404Response'

  # Transactions List
  '/transactions':
    get:
      operationId: ListTransactions
      security:
        - BasicAuth: []
      summary: List Transactions
      tags:
        - Transaction
      description: |
        Request this endpoint to get all transactions or select specific filter and search parameters. You can filter by date, type, or status. And you can search by reference, product id, or account identifier. The returned result will be paginated and ordered by the created date.

        Use API key permission `Transaction Read` to perform this request

        Sample curl Request:
        ```
        curl https://api.xendit.co/transactions?types=PAYMENT&statuses=SUCCESS&channel_categories=EWALLET&channel_categories=RETAIL_OUTLET&limit=2 -X GET \
        -u xnd_development_O46JfOtygef9kMNsK+ZPGT+ZZ9b3ooF4w3Dn+R1k+2fT/7GlCAN3jg==:
        ```
      parameters:
        - $ref: '#/components/parameters/ForUserIdHeader'
        - $ref: '#/components/parameters/TransactionTypeQueryParam'
        - $ref: '#/components/parameters/TransactionStatusQueryParam'
        - $ref: '#/components/parameters/ChannelCategoryQueryParam'
        - $ref: '#/components/parameters/TransactionReferenceIdQueryParam'
        - $ref: '#/components/parameters/ProductIdQueryParam'
        - $ref: '#/components/parameters/AccountIdentifierQueryParam'
        - $ref: '#/components/parameters/TransactionCurrencyParam'
        - $ref: '#/components/parameters/AmountQueryParam'
        - $ref: '#/components/parameters/CreatedGteQueryParam'
        - $ref: '#/components/parameters/CreatedLteQueryParam'
        - $ref: '#/components/parameters/UpdatedGteQueryParam'
        - $ref: '#/components/parameters/UpdatedLteQueryParam'
        - $ref: '#/components/parameters/LimitQueryParam'
        - $ref: '#/components/parameters/AfterIdQueryParam'
        - $ref: '#/components/parameters/BeforeIdQueryParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_more:
                    type: boolean
                    description: |
                      Indicates whether there are more items to be queried with after_id of the last item from the current result.
                      When true, use the HATEOAS links for pagination.
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionObject'
                  links:
                    type: array
                    description: HATEOAS links for pagination. Contains navigation links when more results are available.
                    items:
                      type: object
                      properties:
                        href:
                          type: string
                          description: URI for the next page of results.
                        rel:
                          type: string
                          description: Link relationship type. Value will be 'next' for pagination.
                        method:
                          type: string
                          description: HTTP method to use. Value will be 'GET'.
              example:
                has_more: false
                data:
                  - id: txn_3365895e-3cc1-490a-b48c-2757ce8ab0e5
                    product_id: cmanl0vtp000101u9lqbvn7im
                    type: CONVERSION
                    status: SUCCESS
                    channel_category: OTHER
                    channel_code: DEFAULT
                    reference_id: cmanl0vtp000101u9lqbvn7im
                    account_identifier: null
                    currency: SGD
                    amount: 6.55
                    net_amount: 6.55
                    net_amount_currency: SGD
                    cashflow: MONEY_IN
                    settlement_status: SETTLED
                    estimated_settlement_time: "2025-05-14T06:51:08.999Z"
                    business_id: 675bdaf542c2f448122e71d5
                    created: "2025-05-14T06:51:08.998Z"
                    updated: "2025-05-14T06:52:34.196Z"
                    fee:
                      xendit_fee: 0
                      value_added_tax: 0
                      xendit_withholding_tax: 0
                      third_party_withholding_tax: 0
                      status: NOT_APPLICABLE
                  - id: txn_c3d31125-1a06-4563-b7aa-b574beb7e2f9
                    product_id: cm99a3by9000x01qu51tf1t85
                    type: CONVERSION
