                    business_id: 1234567890abcdef
                    created: "2025-06-01T09:59:00.000Z"
                    updated: "2025-06-01T10:01:00.000Z"
                    fee:
                      xendit_fee: 1000
                      value_added_tax: 0
                      xendit_withholding_tax: 0
                      third_party_withholding_tax: 0
                      status: COMPLETED
                    product_data:
                      capture_id: cap-123e4567-e89b-12d3-a456-426614174002
                      payment_request_id: pr-123e4567-e89b-12d3-a456-426614174003
                links: []
        '400':
          $ref: '#/components/responses/ErrorStatusCode400Response'

  # Report Webhook
  /your_report_webhook_url:
    post:
      operationId: ReportWebhook
      summary: Report webhook notification
      description: >
        Webhook notification that will be sent to your defined webhook url for
        updates to report generation status.
      security: []
      parameters:
        - $ref: '#/components/parameters/XCallbackToken'
      tags:
        - Reports
      requestBody:
        description: Report generation status callback
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportObjectWebhook'
            examples:
              Report Generation Completed:
                value:
                  id: report_068581fd-ff7c-447f-8b16-a2ac00ebf98c
                  url: https://transaction-report-files.s3.us-west-2.amazonaws.com/675bdaf542c2f448122e71d5/LIVE_TRANSACTIONS_REPORT_068581fd-ff7c-447f-8b16-a2ac00ebf98c_20250423040155_20250627040155.csv?AWSAccessKeyId=AKIAWDX4EPHWLBHIQYEQ&Expires=1751548921&Signature=nng1ZrXLGtVc7xSJbIigUXabPWs%3D
                  type: TRANSACTIONS
                  filter:
                    from: '2025-04-23T04:01:55.574Z'
                    to: '2025-06-27T04:01:55.574Z'
                  format: CSV
                  status: COMPLETED
                  created: '2025-07-02T13:21:31.355Z'
                  updated: '2025-07-02T13:22:01.630Z'
                  currency: MYR
                  business_id: 675bdaf542c2f448122e71d5
              Report Generation Failed:
                value:
                  id: report_5c1b34a2-6ceb-4c24-aba9-c836bac82b28
                  type: BALANCE_HISTORY
                  filter:
                    from: '2021-06-23T04:01:55.574Z'
                    to: '2021-06-24T04:01:55.574Z'
                  format: CSV
                  status: FAILED
                  created: '2021-06-24T04:01:55.570Z'
                  updated: '2021-06-24T04:01:55.570Z'
                  currency: IDR
                  business_id: 5f34f60535ba7c1c0eed846a
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request - Invalid webhook payload

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: |
        API Key authentication using HTTPS Basic Auth. 
        Use your API key as the username. The password field can be left empty.
        Note: In the API documentation "Try it" section, password is required, you may include any value.

  parameters:
    AccountTypeQueryParam:
      in: query
      name: account_type
      description: The selected balance type
      required: false
      schema:
        type: string
        default: CASH
        enum:
          - CASH
          - HOLDING
    AtTimestampQueryParam:
      in: query
      name: at_timestamp
      description:  | 
            ISO 8601 date-time format (URI encoded)
            
            Balance returned in the response will be based on the timestamp provided.
            The timestamp value must be URI encoded when passed as a query parameter.
      required: false
      schema:
        type: string
        format: date-time
        example: 2024-01-01T00:00:00.000Z
    ForUserIdHeader:
      in: header
      name: for-user-id
      description: |
            The sub-account user-id that you want to make this transaction for.
            
            This header is only used if you have access to xenPlatform. See xenPlatform for more information
      required: false
      schema:
        type: string
    XCallbackToken:
      in: header
      name: x-callback-token
      description: Verification token that can be used to validate webhook requests
      required: false
      schema:
        type: string
    ReportIdPathParam:
      in: path
      name: report_id
      description: Unique ID generated by Xendit for the particular report
      required: true
      schema:
        $ref: '#/components/schemas/ReportId'
    TransactionIdPathParam:
      in: path
      name: transaction_id
      description: Unique ID generated by Xendit for the particular transaction
      required: true
      schema:
        $ref: '#/components/schemas/TransactionId'
    TransactionTypeQueryParam:
      in: query
      name: types
      description: The type of the transaction
      required: false
      schema:
        $ref: '#/components/schemas/TransactionType'
    TransactionStatusQueryParam:
      in: query
      name: statuses
      description: The status of the transaction
      required: false
      schema:
        $ref: '#/components/schemas/TransactionStatus'
    ChannelCategoryQueryParam:
      in: query
      name: channel_categories
      description: The channel of the transactions that will be filtered. If not specified, all transaction channel will be returned.
      required: false
      schema:
        $ref: '#/components/schemas/ChannelCategory'
    TransactionReferenceIdQueryParam:
      in: query
      name: reference_id
      description: Reference that will be searched. Search by reference is case sensitive and requires exact match. Contact support to enable partial match functionality for your account.
      required: false
      schema: 
        $ref: '#/components/schemas/ReferenceId' 
    ProductIdQueryParam:
      in: query
      name: product_id
      description: Product_id that will be searched. Product_id search is an exact match and case sensitive.
      required: false
      schema:
        $ref: '#/components/schemas/ProductId'
    AccountIdentifierQueryParam:
      in: query
      name: account_identifier
      description: Account identifier that will be searched. Account identifier search is exact match case sensitive.
      required: false
      schema:
        $ref: '#/components/schemas/AccountIdentifier'
    AmountQueryParam:
      in: query
      name: amount
      description: Transaction amount to search. This will be exact match.
      required: false
      schema:
        $ref: '#/components/schemas/TransactionAmount'
    CreatedGteQueryParam:
      in: query
      name: created[gte]
      description: Start time of transaction by created date. If not specified, will list all dates.
      required: false
      schema:
        $ref: '#/components/schemas/TransactionCreatedGte'
    CreatedLteQueryParam:
      in: query
      name: created[lte]
      description: End time of transaction by created date. If not specified, will list all dates.
      required: false
      schema:
        $ref: '#/components/schemas/TransactionCreatedLte'
    UpdatedGteQueryParam:
      in: query
      name: updated[gte]
      description: Start time of transaction by updated date. If not specified, will list all dates.
      required: false
      schema:
        $ref: '#/components/schemas/TransactionUpdatedGte'
    UpdatedLteQueryParam:
      in: query
      name: updated[lte]
      description: End time of transaction by updated date. If not specified, will list all dates.
      required: false
      schema:
        $ref: '#/components/schemas/TransactionUpdatedLte'
    LimitQueryParam:
      in: query
      name: limit
      description: A limit on the number of transactions to be returned for each request.
      required: false
      schema:
        $ref: '#/components/schemas/TransactionLimit'
    AfterIdQueryParam:
      in: query
      name: after_id
      description: Id of the immediately previous item. Use this with `links` on the response for pagination.
      required: false
      schema:
        $ref: '#/components/schemas/TransactionAfterId'
    BeforeIdQueryParam:
      in: query
      name: before_id
      description: ID of the immediately following item.
      required: false
      schema:
        $ref: '#/components/schemas/TransactionBeforeId'
    BalanceCurrencyParam:
      in: query
      name: currency
      description: |
        Currency filter for customers with multi-currency accounts. Only the following currencies are supported for balance and balance history:
        - IDR, PHP, USD, VND, THB, MYR, SGD, EUR, GBP, HKD, AUD
      required: false
      schema:
        type: string
        enum:
          - IDR
          - PHP
          - USD
          - VND
          - THB
          - MYR
          - SGD
          - EUR
          - GBP
          - HKD
          - AUD
    TransactionCurrencyParam:
      in: query
      name: currency
      description: |
        Currency filter for transaction-related endpoints and reports. The following currencies are commonly supported:
        - IDR, PHP, USD, VND, THB, MYR, SGD, EUR, GBP, HKD, AUD
        However, any applicable ISO 4217 currency code may be used depending on your account and transaction type. This parameter is optional; if omitted, all currencies will be included.
      required: false
      schema:
        type: string
        enum:
          - IDR
          - PHP
          - USD
          - VND
          - THB
          - MYR
          - SGD
          - EUR
          - GBP
          - HKD
          - AUD

  responses:
    #Error Responses
    ErrorStatusCode400Response:
      description: 'Inputs are failing validation. The errors field contains details about which fields are violating validation.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error400Schema'
    ErrorStatusCode403Response:
      description: 'API key in use does not have necessary permissions to perform the request. Please assign proper permissions for the key.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error403Schema'
    ErrorStatusCode404Response:
      description: 'The provided `id` does not exist. Please review the `id` and try again'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error403Schema'
    ErrorStatusCode409Response:
      description: 'Conflict'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error409Schema'

  schemas:
    ReportRequest:
