components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    email:
      type: string
      maxLength: 255
      description: A valid email address associated with the object
      format: email
      example: test@example.co
    account_status:
      type: string
      description: Status of the Account you are creating.
      enum:
        - INVITED
        - REGISTERED
        - AWAITING_DOCS
        - PENDING_VERIFICATION
        - LIVE
        - SUSPENDED
    business_name:
      type: string
      description: Name of the business
    account_type:
      type: string
      description: The type of account created
      enum:
        - MANAGED
        - OWNED
    created_gte:
      type: string
      description: Start time of accounts by created date. If not specified will list all dates.
    created_lte:
      type: string
      format: date-time
      description: End time of accounts by created date. If not specified will list all dates.
    updated_gte:
      type: string
      format: date-time
      description: End time of accounts by updated date. If not specified will list all dates.
    updated_lte:
      type: string
      format: date-time
      description: Start time of accounts by updated date. If not specified will list all dates.
    limit:
      type: number
      description: A limit on the number of items to be returned for each request. Range 1 - 50
      minimum: 1
      maximum: 50
      default: 10
    before_id:
      type: string
      description: ID of the immediately following item.
    after_id:
      type: string
      description: ID of the immediately previous item. Use this with `links` on the response for pagination.
    account_id:
      type: string
      description: ID of your Account, use this in the for-user-id header to create transactions on behalf of your Account
    created_time:
      type: string
      format: date-time
      description: Timestamp of when the object was created
    updated_time:
      type: string
      format: date-time
      description: Timestamp of when the object was updated
    public_profile:
      type: object
      properties:
        business_name:
          type: string
          description: Public name of the account.
        description:
          type: string
          description: Additional description visible publicly.
    country:
      type: string
      description: The country (based on ISO 3166-1 Alpha-2) of incorporation for a business, or the country of residence for an individual.
      enum:
        - ID
        - PH
        - VN
        - MY
        - TH
    ListAccountResponseSchema:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/account_id'
        created:
          $ref: '#/components/schemas/created_time'
        updated:
          $ref: '#/components/schemas/updated_time'
        type:
          $ref: '#/components/schemas/account_type'
        email:
          $ref: '#/components/schemas/email'
        public_profile:
          $ref: '#/components/schemas/public_profile'
        country:
          $ref: '#/components/schemas/country'
        status:
          $ref: '#/components/schemas/account_status'
    CreateAccountRequestSchema:
      type: object
      required:
        - email
        - public_profile
      properties:
        email:
          $ref: '#/components/schemas/email'
        type:
          $ref: '#/components/schemas/account_type'
        public_profile:
          $ref: '#/components/schemas/public_profile'
    CreateAccountResponseSchema:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/account_id'
        created:
          $ref: '#/components/schemas/created_time'
        updated:
          $ref: '#/components/schemas/updated_time'
        type:
          $ref: '#/components/schemas/account_type'
        email:
          $ref: '#/components/schemas/email'
        public_profile:
          $ref: '#/components/schemas/public_profile'
        country:
          $ref: '#/components/schemas/country'
        status:
          $ref: '#/components/schemas/account_status'
    400ApiValidationError:
      type: object
      title: API validation error
      properties:
        error_code:
          type: string
          example: API_VALIDATION_ERROR
        error_message:
          type: string
          example: Inputs are failing validation. The errors field contains details about which fields are violating validation.
    400InvalidConfigurationError:
      type: object
      title: API validation error
      properties:
        error_code:
          type: string
          example: INVALID_CONFIGURATION
        error_message:
          type: string
          example: The `configurations` parameter combination is invalid. Please follow the requirement of each parameter written in Request section.
    400TypeConfigConflictError:
      type: object
      title: API validation error
      properties:
        error_code:
          type: string
          example: TYPE_AND_CONFIGURATION_CONFLICT
        error_message:
          type: string
          example: Please provide either one of the `type` field or the `configurations` field
    AccountCallbackDataSchema:
      type: object
      properties:
        user_id:
          type: string
          description: The sub-account business ID
        account_info:
          type: object
          properties:
            payments_enabled:
              type: boolean
              description: Indicates whether live payments are enabled for the account
    AccountSuspensionCallbackSchema:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/account_id'
        created:
          $ref: '#/components/schemas/created_time'
        updated:
          $ref: '#/components/schemas/updated_time'
        email:
          $ref: '#/components/schemas/email'
        public_profile:
          $ref: '#/components/schemas/public_profile'
        status:
          type: string
          enum:
            - SUSPECTED
            - SUSPENDED
            - CLEARED
        reason:
          type: string
          description: Reason given for the status change
    XenditArrayOfErrors:
      type: array
      nullable: true
      items:
        oneOf:
          - type: string
          - type: object
    Error404NotFoundResponse:
      description: The object being referenced does not exist
      type: object
      properties:
        error_code:
          type: string
          enum:
            - DESTINATION_ACCOUNT_NOT_FOUND
            - DATA_NOT_FOUND
            - CALLBACK_AUTHENTICATION_TOKEN_NOT_FOUND_ERROR
        message:
          type: string
        errors:
          $ref: '#/components/schemas/XenditArrayOfErrors'
    account_holder_id:
      type: string
      description: The unique ID of an Account Holder object
    UpdateAccountRequestSchema:
      type: object
      properties:
        email:
          $ref: '#/components/schemas/email'
        public_profile:
          $ref: '#/components/schemas/public_profile'
        account_holder_id:
          $ref: '#/components/schemas/account_holder_id'
    split_rule_id:
      type: string
      description: The unique Split Rule ID
    split_rule_name:
      type: string
      description: Name to identify a split rule. Typically based on transaction and/or sub-merchant types and does not have to be unique. e.g. "standard platform fee and delivery fee", "commission"
    split_route_reference:
      type: string
      description: |
        Reference ID which acts as an identifier of the route itself. This is used to distinguish in case one split rule has multiple routes of the same destinations.
        Its value must be unique and case sensitive for every route object under the same Split Rule.
    split_route_destination_id:
      type: string
      description: Business ID of the destination account where the amount is routed to.This could be the Business ID of your Master or Sub-account.
    currency:
      type: string
      description: ISO 4217 Currency Code
      enum:
        - IDR
        - PHP
        - VND
        - MYR
        - THB
        - SGD
        - USD
    description:
      type: string
      description: Describes the purpose of the object
    route:
      description: Defines a single amount and destination within a split rule
      properties:
        flat_amount:
          type: number
          description: Amount of payments to be split, using a flat rate as a unit. This will be null if not applicable, and is required if `percent_amount` is null. All units must be a positive number
        percent_amount:
          type: number
          description: Amount of payments to be split, using a percent rate as unit. This will be null if not applicable. This will be required if `flat_amount` is null All units must be a positive number, with decimals supported up to 2 decimal places. Percent amounts have to be between 0 and 100 Percent amounts are rounded off to the nearest monetary unit (e.g. 0.50 IDR will be rounded to 1 IDR; 0.49 IDR will be rounded to 0 IDR)
        currency:
          $ref: '#/components/schemas/currency'
        destination_account_id:
          $ref: '#/components/schemas/split_route_destination_id'
        reference_id:
          $ref: '#/components/schemas/split_route_reference'
          maxLength: 255
    CreateSplitRuleRequestSchema:
      type: object
      required:
        - name
        - routes
      properties:
        name:
          type: string
          $ref: '#/components/schemas/split_rule_name'
        description:
          $ref: '#/components/schemas/description'
        routes:
          type: array
          items:
            type: object
            $ref: '#/components/schemas/route'
    metadata:
      type: object
      description: Object of additional key-value pairs that the merchants may use like internal system parameters (business ID, shopping cart). User defines the JSON properties and values. You can specify up to 50 keys, with key names up to 40 characters long and values up to 500 characters long. Otherwise `NULL`
      additionalProperties: true
    CreateSplitRuleResponseSchema:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/split_rule_id'
        name:
          $ref: '#/components/schemas/split_rule_name'
        description:
          $ref: '#/components/schemas/description'
        routes:
          type: array
          items:
            $ref: '#/components/schemas/route'
        created:
          $ref: '#/components/schemas/created_time'
        updated:
          $ref: '#/components/schemas/updated_time'
        metadata:
          $ref: '#/components/schemas/metadata'
    Error400Response:
      description: Inputs are failing validation. The errors field contains details about which fields are violating validation.
      type: object
      properties:
        error_code:
          type: string
          enum:
            - API_VALIDATION_ERROR
            - INVALID_CONFIGURATION
            - INVALID_JSON_FORMAT
            - TYPE_AND_CONFIGURATION_CONFLICT
            - INVALID_SOURCE_OR_DESTINATION_ERROR
            - INSUFFICIENT_BALANCE
            - INVALID_FEE_AMOUNT
            - DUPLICATE_ERROR
            - INVALID_AMOUNT
            - INSUFFICIENT_ACCOUNT_HOLDER_DATA
            - MISMATCH_PAYLOAD_FOR_REFERENCE
            - INVALID_URL_FORMAT
        message:
          type: string
        errors:
          $ref: '#/components/schemas/XenditArrayOfErrors'
    business_detail:
      type: object
      description: An object containing the business detail of the Account Holder
      properties:
        type:
          type: string
          description: The entity type of the business
          enum:
            - CORPORATION
            - PARTNERSHIP
            - SOLE_PROPRIETORSHIP
            - INDIVIDUAL
            - FOREIGN
            - FOREIGN_SEC
            - FOREIGN_NONSEC
        legal_name:
          type: string
          description: Legal name of the business. This must match the documentation submitted.
        trading_name:
          type: string
          description: Trading or brand name of the business. This will be the name that appears to endpayer on payment page.
        description:
          type: string
          description: Description of the business. Please specify what business model or goods and services that the business provide. Max 1000 characters.
        industry_category:
          type: string
          description: |
            One of our accepted Industry Category Codes depending on your entity type and country of operation.

            Refer to the list of [accepted industry category codes here](https://docs.xendit.co/docs/create-verification-requests#list-of-accepted-industry-categories)
        date_of_registration:
          type: string
          format: date
          description: Business registration date in YYYY-MM-DD
        country_of_operation:
          description: Country in which the business is operating at (in ISO 3166-2 format).
          $ref: '#/components/schemas/country'
    address:
      type: object
      description: An address object.
      required:
        - country
        - city
        - province_state
        - street_line1
        - street_line2
        - district
        - sub_district
        - postal_code
      properties:
        country:
          type: string
          $ref: '#/components/schemas/country'
        city:
          type: string
          description: City, village or town
        province_state:
          type: string
          description: Province, state or region
        street_line1:
          type: string
          maxLength: 255
          description: Line 1 of street address e.g street number and name
        street_line2:
          type: string
          maxLength: 255
          description: Line 2 of street address e.g building name or apartment number
        district:
          type: string
          description: District
        sub_district:
          type: string
          description: Sub-district
        postal_code:
          type: string
          description: Zip or postal code
    individual_detail:
      type: object
      description: |
        An object containing the individual details of the Account Holder. This could be the details of the business owner, director etc.
      required:
        - type
        - role
        - given_names
        - surname
        - phone_number
        - email
        - nationality
      properties:
        type:
          type: string
          enum:
            - PIC
            - Incorporator
          description: |
            At least one individual with the type `PIC` (Person in Charge) is required. You may submit multiple PICs for your business in this object.
            A minimum 1 Incorporator and 1 PIC is required when they need to activate Cards capabilities.
        role:
          type: string
          description: This role specifies the role of the PIC or Incorporator. E.g. Owner, Director, Administrator.
        given_names:
          type: string
          maxLength: 255
          description: First and middle name (if any) of the account holder
        surname:
          type: string
          maxLength: 255
          description: Surname or family name of the account holder
        phone_number:
          type: string
          maxLength: 30
          description: The contact number of the Account Holder in `E.164` format. This may also be a landline.
        email:
          type: string
          maxLength: 255
          description: The email address of the account holder
        nationality:
          type: string
          description: Country code for customer's nationality (ISO 3166-2 Country Code)
        place_of_birth:
          type: string
          description: City or other relevant location of the account holder's birth place
        date_of_birth:
          type: string
          format: date
          description: Date of birth of the customer in YYYY-MM-DD
        gender:
          type: string
          enum:
            - MALE
            - FEMALE
            - OTHER
          description: The gender of the account holder
        tax_identification_number:
          type: string
          description: |
            Tax Identification Number of the account holder. This parameter is required when they need to activate Cards capabilities with USD or recurring capabilities.

            Please see more details [here](https://docs.xendit.co/docs/activate-payment-channels)
        address:
          type: object
          description: Address of the incorporator. Only required to activate Cards with USD or recurring capabilities.
          $ref: '#/components/schemas/address'
    kyc_document:
      type: object
      description: A KYC document file for Account Holder verification
      properties:
        country:
          $ref: '#/components/schemas/country'
        type:
          type: string
          description: |
            The type of the legal or KYC requirements document

            Refer to the list of [Required KYC Documents for all countries here](https://docs.xendit.co/docs/create-verification-requests#requirements-by-country-and-entity-type)
        expires_at:
          type: string
          description: Expiry date of the document if relevant. Format `YYYY-MM-DD`
        file_id:
          type: string
          description: The file ID returned by the Upload API
    business_website_url:
      type: string
      maxLength: 255
      description: A valid website associated with the business
      format: website
      example: mystore.com
    business_phone_number:
      type: string
      maxLength: 30
      description: A valid phone number associated with the business
      format: phone
      example: 62123456789
