  /your_split_payment_webhook_url:
    post:
      security: []
      operationId: splitPaymentStatusWebhook
      summary: Split payment status notification webhook
      description: These events will be sent when a split payment is completed or has failed to execute
      tags:
        - xenPlatform
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: ''
              properties:
                event:
                  type: string
                  enum:
                    - split.payment
                  example: split.payment
                  description: Event that occurred for this webhook
                business_id:
                  $ref: '#/components/schemas/account_id'
                created:
                  type: string
                  description: Timestamp of when the webhook was sent
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      description: The unique Split Payment ID created for every split
                    split_rule_id:
                      $ref: '#/components/schemas/split_rule_id'
                    reference_id:
                      $ref: '#/components/schemas/split_route_reference'
                    payment_id:
                      type: string
                      description: |
                        The original payment ID that the Split payment was processed for, or that the Split Rule was linked to using the with-split-rule header.
                        The payment ID is the unique identifier for the payment. Its prefix varies based on the payment method type.
                    payment_reference_id:
                      type: string
                      description: Reference ID of the Payment object
                    source_account_id:
                      type: string
                      description: Business ID of the account where the split was sent from. This is also the account that received the original payment.
                    destination_account_id:
                      $ref: '#/components/schemas/split_route_destination_id'
                    status:
                      type: string
                      description: The status of the split payment.
                      enum:
                        - COMPLETED
                        - FAILED
                    amount:
                      type: number
                      description: The total currency amount that is sent to the destination_account_id
                    currency:
                      $ref: '#/components/schemas/currency'
                    failure_code:
                      type: string
                      description: The failure code for FAILED events
                      example: INSUFFICIENT_BALANCE
            examples:
              Split Payment Completed:
                value:
                  event: split.payment
                  created: '2021-01-01T10:00:00Z'
                  business_id: 5fe2b0137b7d62542fe6d7de
                  data:
                    id: 57fb4e076fa3fa296b7f5a97
                    split_rule_id: "splitru_d9e069f2-4da7-4562-93b7-ded87023d749"
                    reference_id: "my_unique_route_reference_12345"
                    payment_id: "py-1402feb0-bb79-47ae-9d1e-e69394d3949c"
                    payment_reference_id: "my_unique_payment_reference_12345"
                    source_account_id: "5fe2b0137b7d62542fe6d7de"
                    destination_account_id: "67514ce3b045c2ebade1d94e"
                    status: "COMPLETED"
                    amount: 150.45
                    currency: "PHP"
              Split Payment Failed:
                value:
                  event: split.payment
                  created: '2021-01-01T10:00:00Z'
                  business_id: 5fe2b0137b7d62542fe6d7de
                  data:
                    id: 57fb4e076fa3fa296b7f5a97
                    split_rule_id: "splitru_d9e069f2-4da7-4562-93b7-ded87023d749"
                    reference_id: "my_unique_route_reference_12345"
                    payment_id: "py-1402feb0-bb79-47ae-9d1e-e69394d3949c"
                    payment_reference_id: "my_unique_payment_reference_12345"
                    source_account_id: "5fe2b0137b7d62542fe6d7de"
                    destination_account_id: "67514ce3b045c2ebade1d94e"
                    status: "FAILED"
                    amount: 150.45
                    currency: "PHP"
                    failure_code: "INSUFFICIENT_BALANCE"
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request - Invalid webhook payload
