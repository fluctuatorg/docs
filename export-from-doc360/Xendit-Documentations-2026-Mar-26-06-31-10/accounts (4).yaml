      required: false
      schema:
        $ref: '#/components/schemas/business_name'
    account_type_query_param:
      in: query
      name: type
      description: The type of accounts that will be filtered. If not specified, all account types will be returned.
      required: false
      schema:
        $ref: '#/components/schemas/account_type'
    created_gte_query_param:
      in: query
      name: created[gte]
      description: Start time of accounts by created date. If not specified will list all dates.
      required: false
      schema:
        $ref: '#/components/schemas/created_gte'
    created_lte_query_param:
      in: query
      name: created[lte]
      description: End time of accounts by created date. If not specified will list all dates.
      required: false
      schema:
        $ref: '#/components/schemas/created_lte'
    updated_gte_query_param:
      in: query
      name: updated[gte]
      description: Start time of accounts by updated date. If not specified will list all dates.
      required: false
      schema:
        $ref: '#/components/schemas/updated_gte'
    updated_lte_query_param:
      in: query
      name: updated[lte]
      description: End time of accounts by updated date. If not specified will list all dates.
      required: false
      schema:
        $ref: '#/components/schemas/updated_lte'
    limit_query_param:
      in: query
      name: limit
      description: A limit on the number of transactions to be returned for each request.
      required: false
      schema:
        $ref: '#/components/schemas/limit'
    before_id_query_param:
      in: query
      name: before_id
      description: ID of the immediately following item.
      required: false
      schema:
        $ref: '#/components/schemas/before_id'
    after_id_query_param:
      in: query
      name: after_id
      description: ID of the immediately previous item. Use this with links on the response for pagination.
      required: false
      schema:
        $ref: '#/components/schemas/after_id'
    account_id:
      in: path
      name: id
      required: true
      example: 5cafeb170a2b18519b1b8761
      schema:
        $ref: '#/components/schemas/account_id'
    account_holder_id:
      in: path
      name: id
      required: true
      example: 4376b7b0-1c44-46be-8640-828f79cdc8be
      schema:
        $ref: '#/components/schemas/account_holder_id'
    for_user_id_header:
