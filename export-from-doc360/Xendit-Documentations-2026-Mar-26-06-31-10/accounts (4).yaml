openapi: 3.0.0
info:
  title: xenPlatform
  version: '1.0'
  description: |
    xenPlatform is Xendit's solution for platform businesses that work with third-party partners. Platform businesses face complex payments challenges that range from partner onboarding, to moving funds, to payouts and billing.
    With xenPlatform, you can onboard and create accounts for your partners, transact on behalf of them, split payments, monitor their transactions, and directly bill them.

    **Overview:**
    Once xenPlatform has been activated for your account, you may use the Account API to create sub accounts that are linked to your master account.
    Thereafter simply include a for-user-id header in any standard Xendit API call to create a transaction for those accounts.
    These accounts and their transactions will appear in the xenPlatform tab of your Xendit dashboard.
servers:
  - url: https://api.xendit.co
paths:
  /v2/accounts:
    post:
      security:
        - BasicAuth: []
      operationId: createxenPlatformAccount
      summary: Create account
      description: |
        Create Account API allows you to create Accounts for your Partners on your Platform. Once an Account is created, you can accept and route payments through the Transfers API or Platform Fee API.
        Read more about account types [here](https://docs.xendit.co/docs/sub-accounts).
        
        Remember to store the returned account ID value to make transactions for that Account in the future.

        > **Notes**: 
        > - For the `/v2/accounts` endpoint, we allow a maximum of 5 write requests per second.
        > - The `OWNED` type is currently restricted for accounts in Indonesia.
        > 
        > Please contact help@xendit.co if you need the above features.

        **Version**

        This version of the API is asynchronous to improve performance and scalability. We have also added API permissions in this version. If you are using an existing API key, please edit your permissions in your Settings page.

        It is mandatory to wait for the `account.created` callback before attempting to create transactions. Set a Callback URL in your Dashboard to receive Account Updated Callbacks and know when payments can be processed for your Accounts.

        > Use API key permission Account Write to perform this request

        **Account Suspension Callbacks**

        The Account Suspension webhook can be used to let your system know when Xendit has suspected, suspended or cleared the Accounts linked to your Platform. Our teams and systems automatically and regularly review Account behaviour to help Platforms mitigate potential fraud.

        These events may occur if we have reason to believe that the Account has engaged in fraudulent activity. When these events occur, only the transactions occurring on that specific Account will be affected. This approach allows your Platform to continue accepting payments for your other Accounts normally.
      tags:
        - xenPlatform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequestSchema'
            examples:
              Owned Type:
                $ref: '#/components/examples/CreateOwnedAccountExample'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponseSchema'
              examples:
                Owned Sub-account:
                  $ref: '#/components/examples/GetOwnedAccountResponse'
        '400':
          $ref: '#/components/responses/AccountsError400Responses'
    get:
      security:
        - BasicAuth: []
      operationId: listxenPlatformAccounts
      summary: List accounts
      description: |
        Use this endpoint to retrieve information about your sub accounts. You can filter by email, creation date, type, name, or status. The results are paginated and ordered by creation date

        > Use API key permission Accounts Read to perform this request

        > This endpoint is backward compatible with Accounts created using the /accounts endpoint
      tags:
        - xenPlatform
      parameters:
        - $ref: '#/components/parameters/email_query_param'
        - $ref: '#/components/parameters/account_status_query_param'
        - $ref: '#/components/parameters/business_name_query_param'
        - $ref: '#/components/parameters/account_type_query_param'
        - $ref: '#/components/parameters/created_gte_query_param'
        - $ref: '#/components/parameters/created_lte_query_param'
        - $ref: '#/components/parameters/updated_gte_query_param'
        - $ref: '#/components/parameters/updated_lte_query_param'
        - $ref: '#/components/parameters/limit_query_param'
        - $ref: '#/components/parameters/before_id_query_param'
        - $ref: '#/components/parameters/after_id_query_param'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ListAccountResponseSchema'
                  has_more:
                    type: boolean
                    description: |
                      Indicates whether there are more items to be queried with `after_id` of the last item from the current result.
                      Use the `links` to follow to the next result.
                  links:
                    type: array
                    description: |
                      The links to the next page based on HATEOAS if there is next result.
                      The HATEOAS format are:
                      `href`: URI of target, this will be to the next link.
                      `rel`: The relationship between source and target. The value will be `next`.
                      `method`: The HTTP method, the value will be `GET`.
                    items:
                      type: object
                      properties:
                        href:
                          type: string
                        rel:
                          type: string
                        method:
                          type: string
              examples:
                Get Owned Account Response:
                  value:
                    data:
                      - id: 5cafeb170a2b18519b1b8761
                        created: '2021-01-01T10:00:00Z'
                        updated: '2021-01-01T10:00:00Z'
                        type: OWNED
                        email: angie@pinkpanther.com
                        public_profile:
                          business_name: Angie's lemonade stand
                        status: LIVE
                      - id: 3cafeb170a2b18519b1b8762
                        created: '2023-03-22T09:15:00Z'
                        updated: '2023-03-22T09:30:00Z'
                        type: MANAGED
                        email: carol@cooldrinks.com
                        public_profile:
                          business_name: Carol's Cool Drinks
                        status: LIVE
                    has_more: true
                    links:
                      - href: /v2/accounts?after_id=623ace8270bbddf93816b3g1
                        rel: next
                        method: GET
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404NotFoundResponse'
  /v2/accounts/{id}:
    get:
      security:
        - BasicAuth: []
      operationId: getxenPlatformAccount
      summary: Get account
      description: The Get Account API allows you to retrieve a sub-account's information.
      tags:
        - xenPlatform
      parameters:
        - $ref: '#/components/parameters/account_id'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponseSchema'
              examples:
                Owned Sub-account:
                  $ref: '#/components/examples/GetOwnedAccountResponse'
        '404':
          description: Not found error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404NotFoundResponse'
              examples:
                DATA_NOT_FOUND:
                  value:
                    error_code: DATA_NOT_FOUND
                    message: Could not find payout with the corresponding ID. Please try again with a valid ID.
                    errors:
                      - Detailed description here
    patch:
      security:
        - BasicAuth: []
      operationId: updatexenPlatformAccount
      summary: Update account
      description: The Update Account API allows you to update a sub-account's information or link an Account Holder (legacy API) to verify the account.
      tags:
        - xenPlatform
      parameters:
        - $ref: '#/components/parameters/account_id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequestSchema'
            examples:
              Update Business Name:
                value:
                  public profile:
                    business_name: New Business Name
              Link Account Holder:
                value:
                  account_holder_id: 4376b7b0-1c44-46be-8640-828f79cdc8be
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponseSchema'
              examples:
                Owned Sub-account:
                  $ref: '#/components/examples/GetOwnedAccountResponse'
                Link Account Holder:
                  $ref: '#/components/examples/LinkAccountHolderResponse'
        '404':
          description: Not found error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404NotFoundResponse'
              examples:
                DATA_NOT_FOUND:
                  value:
                    error_code: DATA_NOT_FOUND
                    message: Could not find payout with the corresponding ID. Please try again with a valid ID.
                    errors:
                      - Detailed description here
  /split_rules:
    post:
      security:
        - BasicAuth: []
      operationId: createSplitRule
      summary: Create split rule
      description: |
        A Split Rule object defines how payments in xenPlatform can be routed and split to multiple sub-accounts or the Master account.

        Include the `split_rule_id` returned in the response in supported transaction endpoints to automatically route and split payments to multiple account destinations once payments settle.
      tags:
        - xenPlatform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSplitRuleRequestSchema'
            example:
              name: Platform and Delivery Fees
              description: Platform fee and delivery fee for a Marketplace
              routes:
                - flat_amount: 3000
                  currency: IDR
                  destination_account_id: 5f8d0c0603ffe06b7d4d9fcf
                  reference_id: reference-1
                - percent_amount: 5.25
                  currency: IDR
                  destination_account_id: 5f8d0c0603ffe06b7d4d9fcf
                  reference_id: reference-2
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSplitRuleResponseSchema'
              example:
                id: splitru_d9e069f2-4da7-4562-93b7-ded87023d749
                name: Standard platform fee
                description: Platform fee for all transactions accepted on behalf of vendors
                routes:
                  - flat_amount: 3000
                    currency: IDR
                    destination_account_id: 5f8d0c0603ffe06b7d4d9fcf
                    reference_id: reference-1
                  - percent_amount: 5.25
                    currency: IDR
                    destination_account_id: 5cafeb170a2b18519b1b8768
                    reference_id: reference-2
                created: '2020-09-01T07:00:00.007Z'
                updated: '2020-09-01T07:00:00.007Z'
                metadata: {}
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              examples:
                API_VALIDATION_ERROR:
                  value:
                    error_code: INVALID_CONFIGURATION
                    message: Inputs are failing validation. The errors field contains details about which fields are violating validation.
                    errors:
                      - Detailed description here
                INVALID_FEE_AMOUNT:
                  value:
                    error_code: INVALID_FEE_AMOUNT
                    message: Fee amount and/or unit is negative number or incorrect format.
                    errors:
                      - Detailed description here
                DUPLICATE_ERROR:
                  value:
                    error_code: DUPLICATE_ERROR
                    message: Returned if provided `reference_id` is not unique for the routes
                    errors:
                      - Detailed description here
        '404':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404NotFoundResponse'
              examples:
                DESTINATION_ACCOUNT_NOT_FOUND:
                  value:
                    error_code: DESTINATION_ACCOUNT_NOT_FOUND
                    message: Returned when destination_account_id is invalid or not connected to this xenPlatform account
                    errors:
                      - Detailed description here
  /account_holders:
    post:
      security:
        - BasicAuth: []
      operationId: createAccountHolder
      summary: Create account holder
      description: |
        An Account Holder represents the legal entity that holds the Xendit Account that is created in your Platform. You will need to [Create an Account](#create-account) to link the account holder with.
        The details that you need to provide in the request depend on the Account holders' legal entity type. Please refer to [this guide](https://docs.xendit.co/docs/xenplatform-account-holder-api) for a comprehensive step-by-step as well as requirements for each country and entity type.

        You will need to use [Update Account](/update-a-xenplatform-account) API to link the Account Holder to the xenPlatform Account before the verification can begin.

        > You will need the Account Holder `Write` API key permission to perform this request
      tags:
        - Account Holder (Legacy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountHolderRequestSchema'
            examples:
              Philippines Corporation:
                value:
                  business_detail:
                    type: CORPORATION
                    legal_name: My Store Inc.
                    trading_name: John's Store
                    description: description here
                    industry_category: ELECTRONICS_AND_ACCESSORIES
                    date_of_registration: '2023-02-02'
                    country_of_operation: PH
                  individual_details:
                    - given_names: John
                      surname: Doe
                      phone_number: '+63021234567'
                      email: test@xendit.co
                      nationality: PH
                      place_of_birth: PH
                      date_of_birth: '2000-02-02'
                      gender: MALE
                      type: PIC
                      role: owner
                  address:
                    country: PH
                    city: Caloocan
                    street_line1: 9th St
                    street_line2: Building 101
                    district: 1st district
                    sub_district: 2nd subdistrict
                    province_state: Metro Manila
                    postal_code: '1400'
                  kyc_documents:
                    - type: SEC_CERTIFICATE_REGISTRATION_DOCUMENT
                      country: PH
                      file_id: 63f8719642f5856dcb142bd2
                    - type: ARTICLES_OF_INCORPORATION_DOCUMENT
                      country: PH
                      file_id: 63f8719642f5856dcb142bd2
                    - type: NOTARIZED_SECRETARY_CERTIFICATE_DOCUMENT
                      country: PH
                      file_id: 63f8719642f5856dcb142bd2
                    - type: LATEST_GIS_DOCUMENT
                      country: PH
                      file_id: 63f8719642f5856dcb142bd2
                    - type: ACR_OR_IMMIGRANT_COR_DOCUMENT
                      country: PH
                      file_id: 63f8719642f5856dcb142bd2
                    - type: SERVICE_AGREEMENT_DOCUMENT
                      country: PH
                      file_id: 63f8719642f5856dcb142bd2
                  website_url: https://xendit.co
                  phone_number: '+6381234567'
                  email: test@xendit.co
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountHolderResponseSchema'
              examples:
                Philippines Corporation:
                  $ref: '#/components/examples/GetAccountHolderPHResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              examples:
                API_VALIDATION_ERROR:
                  value:
                    error_code: API_VALIDATION_ERROR
                    message: Inputs are failing validation. The errors field contains details about which fields are violating validation.
                    errors:
                      - Detailed description here
        '401':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
              examples:
                INVALID_API_KEY:
                  value:
                    error_code: INVALID_API_KEY
                    message: The API key format is invalid
                    errors:
                      - Detailed description here
        '403':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403ForbiddenResponse'
              examples:
                REQUEST_FORBIDDEN_ERROR:
                  value:
                    error_code: REQUEST_FORBIDDEN_ERROR
                    message: The API key in use does not have the necessary permissions to perform the request. Please assign the xenPlatform Account Holder Write permission for the key.
                    errors:
                      - Detailed description here
                FEATURE_NOT_ACTIVATED:
                  value:
                    error_code: FEATURE_NOT_ACTIVATED
                    message: This feature has not been activated for your account
                    errors:
                      - Detailed description here
        '404':
          description: Not found error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404NotFoundResponse'
              examples:
                DATA_NOT_FOUND:
                  value:
                    error_code: DATA_NOT_FOUND
                    message: Could not find payout with the corresponding ID. Please try again with a valid ID.
                    errors:
                      - Detailed description here
        '500':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500Response'
              examples:
                SERVER_ERROR:
                  value:
                    error_code: SERVER_ERROR
                    message: Something unexpected, our developers have been notified to troubleshoot the issue
                    errors:
                      - Detailed description here
  /account_holders/{id}:
    get:
      security:
        - BasicAuth: []
      operationId: getAccountHolder
      summary: Get account holder
      description: |
        This endpoint retrieves a single Account Holder that was previously created. This is often used for checking the verification status of a Account Holder using the id from the Account Holder Object.

        > Use API key permission Account Holder `Read` to perform this request
      tags:
        - Account Holder (Legacy)
      parameters:
        - $ref: '#/components/parameters/account_holder_id'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountHolderResponseSchema'
              examples:
                Philippines Corporation:
                  $ref: '#/components/examples/GetAccountHolderPHResponse'
        '401':
          description: Not found error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401Response'
              examples:
                INVALID_API_KEY:
                  value:
                    error_code: INVALID_API_KEY
                    message: The API key is invalid
                    errors:
                      - Detailed description here
        '403':
          description: Forbidden error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403ForbiddenResponse'
              examples:
                REQUEST_FORBIDDEN_ERROR:
                  value:
                    error_code: REQUEST_FORBIDDEN_ERROR
                    message: API key in use does not have necessary permissions to perform the request. Please assign the xenPlatform Account Holder Read permission for the key.
                    errors:
                      - Detailed description here
        '404':
          description: Not found error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404NotFoundResponse'
              examples:
                DATA_NOT_FOUND:
                  value:
                    error_code: DATA_NOT_FOUND
                    message: Could not find an account holder with the corresponding ID. Please try again with a valid ID.
                    errors:
                      - Detailed description here
    patch:
      security:
        - BasicAuth: []
      operationId: updateAccountHolder
      summary: Update account holder
      description: |
        Use the Update Account Holder endpoint to:
        1. Update your Account Holder information. This step may be needed when the your information and document submission is insufficient or invalid (e.g invalid website, blurry selfie, invalid ID, etc.).
        2. Activate a payment channel Capability on an Account Holder object associated with a sub-account

        You need to provide an URL to receive webhooks. Please specify your URL in [Webhook Settings](https://dashboard.xendit.co/settings/developers#callbacks) in the Xendit Dashboard.

        > You will need the Account Holder `Write` API key permission to perform this request.
      tags:
        - Account Holder (Legacy)
      parameters:
        - $ref: '#/components/parameters/account_holder_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchAccountHolderRequestSchema'
            examples:
              Update Website:
                value:
                  website_url: valid-marketplace.brand.com
              Update KYC Document:
                value:
                  kyc_documents:
                    - country: PH
                      type: LATEST_GIS_DOCUMENT
                      file_id: 63f8719642f5856dc9feje7
              Activate Payment Channel Capabilities:
                value:
                  capabilities:
                    - type: MONEY_IN
                      channel_code: PH_CARDS
                    - type: MONEY_IN
                      channel_code: GCASH
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAccountHolderResponseSchema'
              examples:
                Philippines Corporation:
                  $ref: '#/components/examples/UpdateAccountHolderPHResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              examples:
                INSUFFICIENT_ACCOUNT_HOLDER_DATA:
                  value:
                    error_code: INSUFFICIENT_ACCOUNT_HOLDER_DATA
                    message: The information in the Account Holder object is not sufficient to request activation for this payment channel. Please update the fields with the correct information.
                    errors:
                      - Detailed description here
        '403':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403ForbiddenResponse'
              examples:
                KYC_VERIFICATION_IN_PROGRESS:
                  value:
                    error_code: KYC_VERIFICATION_IN_PROGRESS
                    message: Account Holder cannot be updated while KYC verification is in progress, please try again when the verification process has been completed.
                    errors:
                      - Detailed description here
                CHANNEL_HAS_BEEN_ACTIVATED:
                  value:
                    error_code: CHANNEL_HAS_BEEN_ACTIVATED
                    message: The payment channel requested has already been activated for this account holder.
                    errors:
                      - Detailed description here
  /callback_urls/{type}:
    post:
      security:
        - BasicAuth: []
      operationId: setWebhookUrl
      summary: Set webhook URL
      description: |

        > ℹ️ Info
        >
        > This API can only be used to set Webhook URLs for our [Legacy Payment and Payout APIs](https://archive.developers.xendit.co/api-reference/#payments-api).
        > For the latest APIs, as a Master Account, you can set up your sub-accounts to send webhooks for their activities to your configured URLs. Otherwise you may
        > set the webhook URLs from each sub-account's Settings page in their Dashboards.
        
        The following can be used in the `type` path parameter:

        Money-In

        - `invoice`: Xendit notifies your system when Invoice has been paid or expired.
        - `fva_status`: Xendit notifies your system when Virtual Account has been created or updated successfully. Support: Indonesia only 🇲🇨
        - `fva_paid`: Xendit notifies your system when Virtual Account has been paid successfully. Support: Indonesia only 🇲🇨
        - `ro_fpc_paid`: Xendit notifies your system when Retail Outlet payment code (Alfamart/Indomaret) in Indonesia has been paid successfully. Support: Indonesia only 🇲🇨
        - `regional_ro_paid`: Xendit notifies your system when Over-the-Counter payment code (7 Eleven, Cebuana, ECPay) in Philippines has been paid successfully. Support: Philippines only 🇵🇭
        - `ewallet`: New eWallet type to receive charge and other eWallet events across eWallets channels from /ewallets/charges API.
        - `payment_method`: Xendit notifies your system when payment method is expiring and/or has expired. Payment Method is a mandatory step to abstract Debit Card/Bank Account for Direct Debit transactions.
        - `payment_method_v2`: Xendit notifies your system when payment method V2 is expiring and/or has activated or expired. Learn more about Payment Method V2 here.
        - `direct_debit`: A Direct Debit payment event will be sent to your system for any successful transactions. Use direct_debit type to receive Direct Debit payment event via webhook.
        - `qr_code`: Xendit notifies your system when QR payment has been made or QR refund has been completed. This field is only supported for qr_codes API version 2022-07-31.
        - `recurring`: Xendit notifies your system when Subscription plan has been activated/inactivated, cycle created/succeeded/retrying/failed, or force attempt failed.
        - `payment_succeeded`: Xendit notifies your system when a payment has been successfully confirmed or received from the partner channel (Only for payments initiated via new Payments API). Support: All businesses
        - `payment_awaiting_capture`: Xendit notifies your system when a payment request with capture_method set to MANUAL has been intialized and a call to the Payment Capture API needed to complete the payment. Support: All businesses
        - `payment_pending`: Xendit notifies your system when a payment is being processed by the partner channel awaiting for the terminal status of it (Only for payments initiated via new Payments API). Support: All businesses
        - `payment_failed`: Xendit notifies your system when a pending payment has failed (Only for payments initiated via new Payments API). Support: All businesses
        - `capture_succeeded`: Xendit notifies your system when a manual capture via the Payment Capture API has succeeded. Support: All businesses
        - `capture_failed`: Xendit notifies your system when a manual capture via the Payment Capture API has Failed. Support: All businesses
        - `payment_request_completed`: Xendit notifies your system when a Direct Debit or E-Wallet payment request has succeeded or failed. Please Note that this is for the Payment Request API only. Make sure that other payment callbacks for Direct Debit or E-wallet are not set to prevent duplication. Support: Thailand 🇹🇭 and Malaysia 🇲🇾 only

        Money-Out

        - `disbursement`: Xendit notifies your system when disbursement has been executed successfully by Xendit, either with COMPLETED or FAILED status. Support: Indonesia only 🇲🇨
        - `ph_disbursement`: Xendit notifies your system when disbursement has been executed successfully by Xendit, either with COMPLETED or FAILED status. Support: Philippines only 🇵🇭
        - `batch_disbursement`: Xendit notifies your system when Batch Disbursement has been executed successfully by Xendit. Support: Indonesia only 🇲🇨
        - `payout`: Xendit notifies your system upon failed and successful payouts. Learn more about Payouts V2 webhooks here.
        Others

        - `report`: Xendit notifies your system to send the report to the specified URLs. Support: All businesses
      tags:
        - xenPlatform
      parameters:
        - $ref: '#/components/parameters/for_user_id_header'
        - in: path
          name: type
          required: true
          description: |
            The type of Webhook URL you want to set
          schema:
            type: string
            enum:
              - invoice
              - fva_status
              - fva_paid
              - ro_fpc_paid
              - regional_ro_paid
              - ewallet
              - payment_method
              - payment_method_v2
              - direct_debit
              - qr_code
              - recurring
              - disbursement
              - ph_disbursement
              - batch_disbursement
              - report
              - payment_succeeded
              - payment_awaiting_capture
              - payment_pending
              - payment_failed
              - capture_succeeded
              - capture_failed
              - payment_request_completed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  description: The URL of your server that you want to receive our Webhooks
                  minLength: 1
            example:
              url: https://www.xendit.co/webhook_catcher
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: The status of setting the Webhook URL
                    enum:
                      - SUCCESSFUL
                  user_id:
                    type: string
                    description: The user_id on which the Webhook URL has been set
                  url:
                    type: string
                    description: The Webhook URL that has been set
                  environment:
                    type: string
                    description: The environment on which the Webhook URL has been set
                    enum:
                      - TEST
                      - LIVE
                  callback_token:
                    type: string
                    description: The unique Webhook token that is attached to each sub-account. Use this to validate that a Webhook is sent from Xendit's servers.
              example:
                status: SUCCESSFUL
                user_id: 5e6b30d967627b957de8c123
                url: https://www.xendit.co/webhook_catcher
                environment: TEST
                callback_token: 66a6680348e1c33ed2b9053a8eb9291b9e2230ff4f4d3057c9f4ac26405d2123
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400Response'
              examples:
                INVALID_URL_FORMAT:
                  value:
                    error_code: INVALID_URL_FORMAT
                    message: You have provided an invalid URL format
                    errors:
                      - Detailed description here
        '404':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404NotFoundResponse'
              examples:
                CALLBACK_AUTHENTICATION_TOKEN_NOT_FOUND_ERROR:
                  value:
                    error_code: CALLBACK_AUTHENTICATION_TOKEN_NOT_FOUND_ERROR
                    message: No webhook verification token found for this business, please contact help@xendit.co to resolve this issue
                    errors:
                      - Detailed description here
  /transfers/reference={reference}:
    get:
      security:
        - BasicAuth: []
