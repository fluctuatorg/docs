  parameters:
    email_query_param:
      in: query
      name: email
      description: The email addresses of the accounts that will be filtered. If not specified, all account emails will be returned.
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/email'
    account_status_query_param:
      in: query
      name: status
      description: The statuses of the accounts that will be filtered. If not specified, all account status will be returned.
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/account_status'
    business_name_query_param:
      in: query
